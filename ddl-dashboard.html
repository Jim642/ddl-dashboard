<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的DDL守护板</title>
  <style>
    :root {
      --bg: #f7f6f3;
      --surface: #ffffff;
      --text: #37352f;
      --text-muted: #787774;
      --border: rgba(55, 53, 47, 0.09);
      --shadow: 0 1px 3px rgba(15, 15, 15, 0.04), 0 4px 12px rgba(15, 15, 15, 0.06);
      --shadow-lg: 0 4px 24px rgba(15, 15, 15, 0.08);
      --accent: #2383e2;
      --accent-hover: #1a6fc4;
      --blue: #3b82f6;
      --orange: #f59e0b;
      --red: #ef4444;
      --radius: 12px;
      --font: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      min-height: 100vh;
    }

    .container {
      max-width: 720px;
      margin: 0 auto;
      padding: 32px 20px 48px;
    }

    /* Header */
    .header {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 32px;
    }

    .header h1 {
      font-size: clamp(1.5rem, 4vw, 1.875rem);
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 18px;
      font-size: 0.9375rem;
      font-weight: 500;
      color: #fff;
      background: var(--accent);
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      box-shadow: var(--shadow);
    }

    .btn-primary:hover {
      background: var(--accent-hover);
    }

    .btn-primary:active {
      transform: scale(0.98);
    }

    /* Section labels */
    .section-label {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      margin-bottom: 12px;
    }

    /* Task list */
    .task-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .empty-hint {
      text-align: center;
      padding: 48px 24px;
      color: var(--text-muted);
      font-size: 0.9375rem;
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px dashed var(--border);
    }

    /* Task card */
    .task-card {
      position: relative;
      background: var(--surface);
      border-radius: var(--radius);
      padding: 20px 20px 20px 24px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      border-left: 4px solid var(--blue);
      transition: box-shadow 0.2s;
    }

    .task-card:hover {
      box-shadow: var(--shadow-lg);
    }

    .task-card.urgency-warn {
      border-left-color: var(--orange);
    }

    .task-card.urgency-danger {
      border-left-color: var(--red);
      animation: breathe 2.5s ease-in-out infinite;
    }

    @keyframes breathe {
      0%, 100% { box-shadow: var(--shadow), 0 0 0 0 rgba(239, 68, 68, 0); }
      50% { box-shadow: var(--shadow-lg), 0 0 0 4px rgba(239, 68, 68, 0.12); }
    }

    .task-card.completed {
      border-left-color: #d1d5db;
      opacity: 0.85;
      animation: none;
    }

    .task-card.completed .card-course,
    .task-card.completed .card-content,
    .task-card.completed .card-deadline,
    .task-card.completed .card-countdown {
      text-decoration: line-through;
      color: var(--text-muted);
    }

    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 8px;
    }

    .card-course {
      font-size: 1.125rem;
      font-weight: 700;
      letter-spacing: -0.01em;
    }

    .btn-complete {
      flex-shrink: 0;
      padding: 4px 10px;
      font-size: 0.8125rem;
      color: var(--text-muted);
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s, background 0.15s;
    }

    .btn-complete:hover {
      color: #16a34a;
      border-color: #86efac;
      background: #f0fdf4;
    }

    .card-content {
      font-size: 0.9375rem;
      color: var(--text);
      margin-bottom: 12px;
    }

    .card-meta {
      display: flex;
      flex-direction: column;
      gap: 4px;
      font-size: 0.875rem;
    }

    .card-deadline {
      color: var(--text-muted);
    }

    .card-countdown {
      font-weight: 500;
      color: var(--text);
    }

    .task-card.urgency-warn .card-countdown { color: #b45309; }
    .task-card.urgency-danger .card-countdown { color: var(--red); }

    .card-actions {
      position: absolute;
      top: 16px;
      right: 16px;
    }

    .btn-delete {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      color: var(--text-muted);
      background: transparent;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: color 0.15s, background 0.15s;
    }

    .btn-delete:hover {
      color: var(--red);
      background: #fef2f2;
    }

    /* Archive */
    .archive {
      margin-top: 40px;
      border-top: 1px solid var(--border);
      padding-top: 24px;
    }

    .archive-toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      padding: 12px 0;
      font-size: 0.9375rem;
      font-weight: 600;
      color: var(--text-muted);
      background: none;
      border: none;
      cursor: pointer;
      text-align: left;
      transition: color 0.15s;
    }

    .archive-toggle:hover {
      color: var(--text);
    }

    .archive-toggle .chevron {
      display: inline-block;
      transition: transform 0.2s;
      font-size: 0.75rem;
    }

    .archive-toggle[aria-expanded="true"] .chevron {
      transform: rotate(90deg);
    }

    .archive-body {
      overflow: hidden;
      transition: max-height 0.3s ease, opacity 0.2s;
    }

    .archive-body.collapsed {
      max-height: 0 !important;
      opacity: 0;
      pointer-events: none;
    }

    .archive-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding-top: 8px;
    }

    .task-card.completed {
      padding-right: 52px;
    }

    /* Modal */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(15, 15, 15, 0.35);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      z-index: 1000;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.2s, visibility 0.2s;
    }

    .overlay.open {
      opacity: 1;
      visibility: visible;
    }

    .modal {
      width: 100%;
      max-width: 480px;
      max-height: min(90vh, 720px);
      overflow-y: auto;
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow-lg);
      padding: 28px;
      transform: translateY(8px) scale(0.98);
      transition: transform 0.2s;
    }

    .overlay.open .modal {
      transform: translateY(0) scale(1);
    }

    .modal h2 {
      font-size: 1.25rem;
      font-weight: 600;
      margin-bottom: 24px;
    }

    .form-group {
      margin-bottom: 18px;
    }

    .form-group label {
      display: block;
      font-size: 0.8125rem;
      font-weight: 500;
      color: var(--text-muted);
      margin-bottom: 6px;
    }

    .form-group input {
      width: 100%;
      padding: 10px 12px;
      font-size: 0.9375rem;
      font-family: inherit;
      color: var(--text);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .form-group input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(35, 131, 226, 0.15);
    }

    .form-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      margin-top: 28px;
    }

    .btn-secondary {
      padding: 10px 18px;
      font-size: 0.9375rem;
      font-weight: 500;
      color: var(--text);
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn-secondary:hover {
      background: var(--bg);
    }

    .form-hint {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 4px;
    }

    .materials-section-label {
      font-size: 0.8125rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 10px;
    }

    .drop-zone {
      padding: 20px 16px;
      text-align: center;
      font-size: 0.8125rem;
      color: var(--text-muted);
      background: var(--bg);
      border: 1.5px dashed var(--border);
      border-radius: 8px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }

    .drop-zone:hover,
    .drop-zone.dragover {
      border-color: var(--accent);
      background: #eef6fd;
    }

    .drop-zone input {
      display: none;
    }

    .link-add-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }

    .link-add-row input {
      flex: 1;
      min-width: 120px;
      padding: 8px 10px;
      font-size: 0.875rem;
      font-family: inherit;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--bg);
    }

    .link-add-row input:focus {
      outline: none;
      border-color: var(--accent);
    }

    .btn-add-link {
      padding: 8px 12px;
      font-size: 0.8125rem;
      font-weight: 500;
      color: var(--accent);
      background: transparent;
      border: 1px solid rgba(35, 131, 226, 0.35);
      border-radius: 8px;
      cursor: pointer;
      white-space: nowrap;
    }

    .btn-add-link:hover {
      background: #eef6fd;
    }

    .form-materials-list {
      margin-top: 12px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .form-material-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 8px 10px;
      font-size: 0.8125rem;
      background: var(--bg);
      border-radius: 6px;
      border: 1px solid var(--border);
    }

    .form-material-item span {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .btn-remove-item {
      flex-shrink: 0;
      padding: 2px 6px;
      font-size: 0.75rem;
      color: var(--text-muted);
      background: none;
      border: none;
      cursor: pointer;
    }

    .btn-remove-item:hover {
      color: var(--red);
    }

    .card-materials {
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }

    .materials-toggle {
      display: flex;
      align-items: center;
      gap: 6px;
      width: 100%;
      padding: 4px 0;
      font-size: 0.8125rem;
      font-weight: 500;
      color: var(--text-muted);
      background: none;
      border: none;
      cursor: pointer;
      text-align: left;
    }

    .materials-toggle:hover {
      color: var(--text);
    }

    .materials-toggle .chevron {
      font-size: 0.625rem;
      transition: transform 0.2s;
    }

    .materials-toggle[aria-expanded="true"] .chevron {
      transform: rotate(90deg);
    }

    .materials-body {
      overflow: hidden;
      max-height: 400px;
      transition: max-height 0.25s ease, opacity 0.2s;
    }

    .materials-body.collapsed {
      max-height: 0 !important;
      opacity: 0;
      pointer-events: none;
    }

    .materials-list {
      padding-top: 8px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .material-file-btn,
    .material-link {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      padding: 8px 10px;
      font-size: 0.8125rem;
      text-align: left;
      color: var(--text);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.15s, border-color 0.15s;
    }

    .material-file-btn:hover,
    .material-link:hover {
      background: #eeece8;
      border-color: rgba(55, 53, 47, 0.15);
    }

    .material-file-btn .icon,
    .material-link .icon {
      flex-shrink: 0;
    }

    .material-link-label {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .card-countdown-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
    }

    .btn-snooze {
      padding: 2px 8px;
      font-size: 0.75rem;
      color: var(--text-muted);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }

    .btn-snooze:hover {
      border-color: #d4d4d4;
      background: #eeece8;
    }

    .card-reminders {
      font-size: 0.8125rem;
      color: var(--text-muted);
    }

    .card-planned {
      color: var(--text-muted);
    }

    .card-toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 4px;
    }

    .btn-edit {
      padding: 4px 10px;
      font-size: 0.8125rem;
      color: var(--text-muted);
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      cursor: pointer;
    }

    .btn-edit:hover {
      color: var(--accent);
      border-color: rgba(35, 131, 226, 0.35);
    }

    /* Notification banner */
    .notif-banner {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      margin-bottom: 24px;
      background: #eef6fd;
      border: 1px solid rgba(35, 131, 226, 0.2);
      border-radius: var(--radius);
      font-size: 0.875rem;
    }

    .notif-banner.denied {
      background: #fef9ee;
      border-color: rgba(245, 158, 11, 0.35);
    }

    .notif-banner-text {
      flex: 1;
      min-width: 200px;
    }

    .notif-banner-actions {
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }

    .btn-notif {
      padding: 6px 14px;
      font-size: 0.8125rem;
      font-weight: 500;
      border-radius: 6px;
      border: none;
      cursor: pointer;
    }

    .btn-notif-primary {
      background: var(--accent);
      color: #fff;
    }

    .btn-notif-primary:hover {
      background: var(--accent-hover);
    }

    .btn-notif-ghost {
      background: transparent;
      color: var(--text-muted);
    }

    .btn-notif-ghost:hover {
      color: var(--text);
    }

    @media (max-width: 480px) {
      .container {
        padding: 24px 16px 40px;
      }

      .header {
        flex-direction: column;
        align-items: stretch;
      }

      .btn-primary {
        justify-content: center;
        width: 100%;
      }

      .task-card {
        padding: 16px 16px 16px 20px;
      }

      .card-top {
        flex-wrap: wrap;
        padding-right: 0;
      }

      .btn-complete {
        order: 2;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header class="header">
      <h1>📚 我的DDL守护板</h1>
      <button type="button" class="btn-primary" id="btnAdd">+ 添加新任务</button>
    </header>

    <div id="notifBanner" class="notif-banner" hidden>
      <p class="notif-banner-text" id="notifBannerText"></p>
      <div class="notif-banner-actions" id="notifBannerActions"></div>
    </div>

    <p class="section-label">进行中</p>
    <div class="task-list" id="activeList"></div>
    <p class="empty-hint" id="emptyHint" hidden>还没有任务，点击上方按钮添加第一个 DDL 吧</p>

    <section class="archive">
      <button type="button" class="archive-toggle" id="archiveToggle" aria-expanded="true">
        <span class="chevron">▶</span>
        <span id="archiveTitle">✅ 已完成的挑战 (0)</span>
      </button>
      <div class="archive-body" id="archiveBody">
        <div class="archive-list task-list" id="completedList"></div>
      </div>
    </section>
  </div>

  <div class="overlay" id="overlay" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal">
      <h2 id="modalTitle">添加新任务</h2>
      <form id="taskForm">
        <div class="form-group">
          <label for="courseName">课程名称</label>
          <input type="text" id="courseName" name="courseName" placeholder="例如：高等数学" required autocomplete="off">
        </div>
        <div class="form-group">
          <label for="assignment">作业内容</label>
          <input type="text" id="assignment" name="assignment" placeholder="例如：第三章习题" required autocomplete="off">
        </div>
        <div class="form-group">
          <label for="plannedStart">计划开始日期</label>
          <input type="date" id="plannedStart" name="plannedStart" required>
          <p class="form-hint">当天早上 8:00 会提醒你开始动手</p>
        </div>
        <div class="form-group">
          <label for="deadline">截止日期和时间</label>
          <input type="datetime-local" id="deadline" name="deadline" required>
          <p class="form-hint">截止前一日晚上 20:00 会提醒你最后冲刺</p>
        </div>
        <div class="form-group">
          <p class="materials-section-label">📎 添加资料</p>
          <label class="drop-zone" id="dropZone">
            <input type="file" id="fileInput" multiple accept=".pdf,.doc,.docx,.ppt,.pptx,.xls,.xlsx,.png,.jpg,.jpeg,.gif,.webp,.txt,image/*">
            拖拽文件到此处，或点击选择<br>
            <span class="form-hint">支持 PDF、Word、PPT、图片等，单文件不超过 10MB</span>
          </label>
          <div class="link-add-row">
            <input type="url" id="linkUrl" placeholder="粘贴网盘 / 在线文档链接" autocomplete="off">
            <input type="text" id="linkLabel" placeholder="说明（如：老师发的作业要求）" autocomplete="off">
            <button type="button" class="btn-add-link" id="btnAddLink">添加链接</button>
          </div>
          <div class="form-materials-list" id="formMaterialsList"></div>
        </div>
        <div class="form-actions">
          <button type="button" class="btn-secondary" id="btnCancel">取消</button>
          <button type="submit" class="btn-primary">保存</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    const STORAGE_KEY = 'ddl-dashboard-tasks';
    const FIRED_KEY = 'ddl-dashboard-fired';
    const NOTIF_DISMISS_KEY = 'ddl-dashboard-notif-dismiss';
    const MAX_FILE_SIZE = 10 * 1024 * 1024;

    let tasks = [];
    let editingTaskId = null;
    let formMaterials = { files: [], links: [] };
    const scheduledTimeouts = [];

    const $ = (sel) => document.querySelector(sel);

    function loadTasks() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        tasks = raw ? JSON.parse(raw) : [];
        let migrated = false;
        tasks.forEach((task) => {
          if (migrateTask(task)) migrated = true;
        });
        if (migrated) saveTasks();
      } catch {
        tasks = [];
      }
    }

    function migrateTask(task) {
      let changed = false;
      if (!task.plannedStart) {
        const dl = new Date(task.deadline);
        const start = new Date(dl);
        start.setDate(start.getDate() - 7);
        const today = new Date();
        today.setHours(0, 0, 0, 0);
        if (start < today) start.setTime(today.getTime());
        task.plannedStart = toDateInputValue(start);
        changed = true;
      }
      if (!task.materials) {
        task.materials = { files: [], links: [] };
        changed = true;
      }
      return changed;
    }

    function saveTasks() {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
      } catch (e) {
        if (e && (e.name === 'QuotaExceededError' || e.code === 22)) {
          alert('本地存储空间已满，请删除部分任务资料、压缩文件，或改用链接代替大文件。');
        }
        throw e;
      }
    }

    function cloneMaterials(materials) {
      return {
        files: (materials?.files || []).map((f) => ({ ...f })),
        links: (materials?.links || []).map((l) => ({ ...l })),
      };
    }

    function getMaterialsCount(task) {
      const m = task.materials || { files: [], links: [] };
      return (m.files?.length || 0) + (m.links?.length || 0);
    }

    function formatFileSize(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
    }

    function resetFormMaterials() {
      formMaterials = { files: [], links: [] };
      renderFormMaterialsList();
    }

    function loadFormMaterialsFromTask(task) {
      formMaterials = cloneMaterials(task.materials);
      renderFormMaterialsList();
    }

    function renderFormMaterialsList() {
      const list = $('#formMaterialsList');
      const items = [];

      formMaterials.files.forEach((f) => {
        items.push(`
          <div class="form-material-item">
            <span>📄 ${escapeHtml(f.name)} (${formatFileSize(f.size)})</span>
            <button type="button" class="btn-remove-item" data-remove="file" data-id="${f.id}">移除</button>
          </div>
        `);
      });

      formMaterials.links.forEach((l) => {
        items.push(`
          <div class="form-material-item">
            <span>🔗 ${escapeHtml(l.label || l.url)}</span>
            <button type="button" class="btn-remove-item" data-remove="link" data-id="${l.id}">移除</button>
          </div>
        `);
      });

      list.innerHTML = items.join('') || '<p class="form-hint">暂无资料，可上传文件或添加链接</p>';

      list.querySelectorAll('[data-remove]').forEach((btn) => {
        btn.onclick = () => {
          const { remove, id } = btn.dataset;
          if (remove === 'file') {
            formMaterials.files = formMaterials.files.filter((f) => f.id !== id);
          } else {
            formMaterials.links = formMaterials.links.filter((l) => l.id !== id);
          }
          renderFormMaterialsList();
        };
      });
    }

    function processFiles(fileList) {
      Array.from(fileList).forEach((file) => {
        if (file.size > MAX_FILE_SIZE) {
          alert(`「${file.name}」超过 10MB，请压缩后上传或改用链接分享。`);
          return;
        }
        const reader = new FileReader();
        reader.onload = () => {
          const result = reader.result;
          const base64 = typeof result === 'string' ? result.split(',')[1] : '';
          formMaterials.files.push({
            id: generateId(),
            name: file.name,
            mimeType: file.type || 'application/octet-stream',
            size: file.size,
            data: base64,
          });
          renderFormMaterialsList();
        };
        reader.onerror = () => alert(`读取「${file.name}」失败，请重试。`);
        reader.readAsDataURL(file);
      });
    }

    function addLinkFromForm() {
      const url = $('#linkUrl').value.trim();
      const label = $('#linkLabel').value.trim();
      if (!url) {
        alert('请粘贴链接地址');
        return;
      }
      try {
        new URL(url);
      } catch {
        alert('链接格式不正确，请以 http:// 或 https:// 开头');
        return;
      }
      formMaterials.links.push({
        id: generateId(),
        url,
        label: label || url,
      });
      $('#linkUrl').value = '';
      $('#linkLabel').value = '';
      renderFormMaterialsList();
    }

    function getFileDataUrl(file) {
      return `data:${file.mimeType};base64,${file.data}`;
    }

    function previewOrDownloadFile(file) {
      const url = getFileDataUrl(file);
      const canPreview =
        file.mimeType.startsWith('image/') || file.mimeType === 'application/pdf';
      if (canPreview) {
        window.open(url, '_blank', 'noopener');
      } else {
        const a = document.createElement('a');
        a.href = url;
        a.download = file.name;
        a.click();
      }
    }

    function buildMaterialsCardHTML(task) {
      const count = getMaterialsCount(task);
      if (count === 0) return '';

      const m = task.materials;
      const filesHtml = (m.files || [])
        .map(
          (f) => `
        <button type="button" class="material-file-btn" data-action="preview-file" data-task-id="${task.id}" data-file-id="${f.id}">
          <span class="icon">📄</span>
          <span>${escapeHtml(f.name)}</span>
        </button>
      `
        )
        .join('');

      const linksHtml = (m.links || [])
        .map(
          (l) => `
        <a class="material-link" href="${escapeHtml(l.url)}" target="_blank" rel="noopener noreferrer">
          <span class="icon">🔗</span>
          <span class="material-link-label">${escapeHtml(l.label || l.url)}</span>
        </a>
      `
        )
        .join('');

      return `
        <div class="card-materials">
          <button type="button" class="materials-toggle" data-action="toggle-materials" data-id="${task.id}" aria-expanded="false">
            <span class="chevron">▶</span>
            <span>📎 相关资料 (${count})</span>
          </button>
          <div class="materials-body collapsed" id="materials-body-${task.id}">
            <div class="materials-list">
              ${filesHtml}
              ${linksHtml}
            </div>
          </div>
        </div>
      `;
    }

    function getFiredMap() {
      try {
        return JSON.parse(localStorage.getItem(FIRED_KEY) || '{}');
      } catch {
        return {};
      }
    }

    function setFiredMap(map) {
      localStorage.setItem(FIRED_KEY, JSON.stringify(map));
    }

    function notifRecordKey(taskId, type, alarmMs) {
      return `${taskId}:${type}:${alarmMs}`;
    }

    function toDateInputValue(d) {
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      return `${y}-${m}-${day}`;
    }

    function parseDateLocal(dateStr) {
      const [y, m, d] = dateStr.split('-').map(Number);
      return new Date(y, m - 1, d);
    }

    function dateAtLocalTime(dateStr, hour, minute) {
      const d = parseDateLocal(dateStr);
      d.setHours(hour, minute, 0, 0);
      return d.getTime();
    }

    function getStartAlarmMs(task) {
      return dateAtLocalTime(task.plannedStart, 8, 0);
    }

    function getSprintAlarmMs(task) {
      const dl = new Date(task.deadline);
      const d = new Date(dl.getFullYear(), dl.getMonth(), dl.getDate() - 1, 20, 0, 0, 0);
      return d.getTime();
    }

    function formatDateOnly(dateStr) {
      const d = parseDateLocal(dateStr);
      return `${d.getFullYear()}年${d.getMonth() + 1}月${d.getDate()}日`;
    }

    function formatAlarmShort(ms) {
      const d = new Date(ms);
      return `${d.getMonth() + 1}/${d.getDate()} ${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`;
    }

    function daysUntilDeadline(fromMs, deadlineIso) {
      const diff = new Date(deadlineIso).getTime() - fromMs;
      return Math.max(0, Math.ceil(diff / (24 * 60 * 60 * 1000)));
    }

    function addOneDayToDateStr(dateStr) {
      const d = parseDateLocal(dateStr);
      d.setDate(d.getDate() + 1);
      return toDateInputValue(d);
    }

    function add24HoursToIso(iso) {
      return new Date(new Date(iso).getTime() + 24 * 60 * 60 * 1000).toISOString();
    }

    function clearScheduledAlarms() {
      scheduledTimeouts.forEach(clearTimeout);
      scheduledTimeouts.length = 0;
    }

    function showBrowserNotification(title, body, tag) {
      if (Notification.permission !== 'granted') return;
      try {
        new Notification(title, { body, tag });
      } catch {
        new Notification(title, { body });
      }
    }

    function tryFireAlarm(task, type, alarmMs) {
      if (task.completed) return;
      const now = Date.now();
      if (now < alarmMs) return;
      if (now - alarmMs > 3 * 60 * 60 * 1000) return;

      const key = notifRecordKey(task.id, type, alarmMs);
      const fired = getFiredMap();
      if (fired[key]) return;

      let body;
      if (type === 'start') {
        const days = daysUntilDeadline(alarmMs, task.deadline);
        body = `📚 该开始攻克 ${task.assignment} 了！离DDL还有${days}天，现在就动手吧。`;
      } else {
        body = `🚨 ${task.assignment} 明天就要交了！是时候最后检查一遍了。`;
      }

      showBrowserNotification('DDL 守护板', body, key);
      fired[key] = true;
      setFiredMap(fired);
    }

    function checkDueNotifications() {
      if (Notification.permission !== 'granted') return;
      tasks.filter((t) => !t.completed).forEach((task) => {
        tryFireAlarm(task, 'start', getStartAlarmMs(task));
        tryFireAlarm(task, 'sprint', getSprintAlarmMs(task));
      });
    }

    function scheduleAlarms() {
      clearScheduledAlarms();
      if (Notification.permission !== 'granted') return;

      const maxDelay = 7 * 24 * 60 * 60 * 1000;
      tasks.filter((t) => !t.completed).forEach((task) => {
        [
          { type: 'start', ms: getStartAlarmMs(task) },
          { type: 'sprint', ms: getSprintAlarmMs(task) },
        ].forEach(({ type, ms }) => {
          const delay = ms - Date.now();
          if (delay > 0 && delay <= maxDelay) {
            scheduledTimeouts.push(
              setTimeout(() => tryFireAlarm(task, type, ms), delay)
            );
          }
        });
      });
    }

    function updateNotifBanner() {
      const banner = $('#notifBanner');
      const text = $('#notifBannerText');
      const actions = $('#notifBannerActions');
      const perm = Notification.permission;

      if (perm === 'granted') {
        banner.hidden = true;
        return;
      }

      if (perm === 'default' && localStorage.getItem(NOTIF_DISMISS_KEY)) {
        banner.hidden = true;
        return;
      }

      banner.hidden = false;
      banner.classList.toggle('denied', perm === 'denied');

      if (perm === 'denied') {
        text.textContent =
          '浏览器已禁止通知。请在地址栏左侧的锁图标 → 网站设置 → 通知 → 改为「允许」，然后刷新本页。';
        actions.innerHTML =
          '<button type="button" class="btn-notif btn-notif-ghost" id="btnDismissNotif">知道了</button>';
        $('#btnDismissNotif').onclick = () => {
          banner.hidden = true;
        };
        return;
      }

      text.textContent =
        '开启浏览器通知后，会在「计划开始日 8:00」和「截止前一日 20:00」准时提醒你，不再错过 DDL。';
      actions.innerHTML = `
        <button type="button" class="btn-notif btn-notif-primary" id="btnEnableNotif">开启智能提醒</button>
        <button type="button" class="btn-notif btn-notif-ghost" id="btnDismissNotif">稍后再说</button>
      `;
      $('#btnEnableNotif').onclick = async () => {
        const result = await Notification.requestPermission();
        updateNotifBanner();
        if (result === 'granted') {
          scheduleAlarms();
          checkDueNotifications();
        }
      };
      $('#btnDismissNotif').onclick = () => {
        localStorage.setItem(NOTIF_DISMISS_KEY, '1');
        banner.hidden = true;
      };
    }

    async function requestNotificationIfNeeded() {
      if (!('Notification' in window)) {
        $('#notifBanner').hidden = false;
        $('#notifBanner').classList.add('denied');
        $('#notifBannerText').textContent = '当前浏览器不支持桌面通知，请换用 Chrome / Edge / Firefox 打开。';
        $('#notifBannerActions').innerHTML = '';
        return;
      }
      updateNotifBanner();
      if (Notification.permission === 'granted') {
        scheduleAlarms();
        checkDueNotifications();
      }
    }

    function generateId() {
      return 't_' + Date.now() + '_' + Math.random().toString(36).slice(2, 9);
    }

    function getUrgency(deadlineMs) {
      const now = Date.now();
      const diff = deadlineMs - now;
      const oneDay = 24 * 60 * 60 * 1000;
      const threeDays = 3 * oneDay;

      if (diff < oneDay) return 'danger';
      if (diff <= threeDays) return 'warn';
      return 'calm';
    }

    function formatDeadline(iso) {
      const d = new Date(iso);
      const y = d.getFullYear();
      const m = d.getMonth() + 1;
      const day = d.getDate();
      const h = String(d.getHours()).padStart(2, '0');
      const min = String(d.getMinutes()).padStart(2, '0');
      return `${y}年${m}月${day}日 ${h}:${min}`;
    }

    function formatCountdown(deadlineMs) {
      const now = Date.now();
      let diff = deadlineMs - now;

      if (diff <= 0) {
        const overdue = Math.abs(diff);
        const days = Math.floor(overdue / (24 * 60 * 60 * 1000));
        const hours = Math.floor((overdue % (24 * 60 * 60 * 1000)) / (60 * 60 * 1000));
        if (days > 0) return `⚠️ 已过期 ${days} 天 ${hours} 小时`;
        const mins = Math.floor((overdue % (60 * 60 * 1000)) / (60 * 1000));
        if (hours > 0) return `⚠️ 已过期 ${hours} 小时 ${mins} 分钟`;
        return `⚠️ 已过期 ${mins} 分钟`;
      }

      const days = Math.floor(diff / (24 * 60 * 60 * 1000));
      diff %= 24 * 60 * 60 * 1000;
      const hours = Math.floor(diff / (60 * 60 * 1000));
      diff %= 60 * 60 * 1000;
      const minutes = Math.floor(diff / (60 * 1000));

      if (days > 0) return `⏳ 还剩 ${days} 天 ${hours} 小时`;
      if (hours > 0) return `⏳ 还剩 ${hours} 小时 ${minutes} 分钟`;
      return `⏳ 还剩 ${minutes} 分钟`;
    }

    function createCardHTML(task) {
      const deadlineMs = new Date(task.deadline).getTime();
      const urgency = getUrgency(deadlineMs);
      const urgencyClass = task.completed
        ? 'completed'
        : urgency === 'danger'
          ? 'urgency-danger'
          : urgency === 'warn'
            ? 'urgency-warn'
            : '';

      const countdown = formatCountdown(deadlineMs);
      const deadlineStr = formatDeadline(task.deadline);
      const plannedStr = task.plannedStart ? formatDateOnly(task.plannedStart) : '';
      const startAlarm = getStartAlarmMs(task);
      const sprintAlarm = getSprintAlarmMs(task);
      const remindersStr = task.completed
        ? ''
        : `<span class="card-reminders">🔔 启动 ${formatAlarmShort(startAlarm)} · 冲刺 ${formatAlarmShort(sprintAlarm)}</span>`;

      const completeBtn = `<button type="button" class="btn-complete" data-action="complete" data-id="${task.id}">✓ 完成</button>`;
      const editBtn = `<button type="button" class="btn-edit" data-action="edit" data-id="${task.id}">编辑</button>`;
      const snoozeBtn = `<button type="button" class="btn-snooze" data-action="snooze" data-id="${task.id}">🥱 再等1天</button>`;
      const deleteBtn = `
        <div class="card-actions">
          <button type="button" class="btn-delete" data-action="delete" data-id="${task.id}" title="彻底删除" aria-label="删除">🗑</button>
        </div>`;

      return `
        <article class="task-card ${urgencyClass}" data-id="${task.id}">
          ${task.completed ? deleteBtn : ''}
          <div class="card-top">
            <h3 class="card-course">${escapeHtml(task.courseName)}</h3>
            ${task.completed ? '' : completeBtn}
          </div>
          <p class="card-content">${escapeHtml(task.assignment)}</p>
          <div class="card-meta">
            ${plannedStr && !task.completed ? `<span class="card-planned">🎯 计划开始：${plannedStr}</span>` : ''}
            <span class="card-deadline">📅 截止：${deadlineStr}</span>
            ${remindersStr}
            <div class="card-countdown-row">
              <span class="card-countdown" data-countdown="${task.id}">${countdown}</span>
              ${task.completed ? '' : snoozeBtn}
            </div>
            ${task.completed ? '' : `<div class="card-toolbar">${editBtn}</div>`}
          </div>
          ${buildMaterialsCardHTML(task)}
        </article>
      `;
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function render() {
      const active = tasks
        .filter((t) => !t.completed)
        .sort((a, b) => new Date(a.deadline) - new Date(b.deadline));
      const completed = tasks
        .filter((t) => t.completed)
        .sort((a, b) => (b.completedAt || 0) - (a.completedAt || 0));

      const activeList = $('#activeList');
      const completedList = $('#completedList');
      const emptyHint = $('#emptyHint');

      activeList.innerHTML = active.map(createCardHTML).join('');
      completedList.innerHTML = completed.map(createCardHTML).join('');

      emptyHint.hidden = active.length > 0;
      $('#archiveTitle').textContent = `✅ 已完成的挑战 (${completed.length})`;

      bindCardEvents();
      updateCountdowns();
      scheduleAlarms();
      if (archiveExpanded) {
        requestAnimationFrame(() => {
          archiveBody.style.maxHeight = archiveBody.scrollHeight + 'px';
        });
      }
    }

    function bindCardEvents() {
      document.querySelectorAll('[data-action="complete"]').forEach((btn) => {
        btn.onclick = () => {
          const id = btn.dataset.id;
          const task = tasks.find((t) => t.id === id);
          if (task) {
            task.completed = true;
            task.completedAt = Date.now();
            saveTasks();
            render();
            scheduleAlarms();
          }
        };
      });

      document.querySelectorAll('[data-action="delete"]').forEach((btn) => {
        btn.onclick = () => {
          const id = btn.dataset.id;
          tasks = tasks.filter((t) => t.id !== id);
          saveTasks();
          render();
        };
      });

      document.querySelectorAll('[data-action="snooze"]').forEach((btn) => {
        btn.onclick = () => {
          const task = tasks.find((t) => t.id === btn.dataset.id);
          if (!task || task.completed) return;
          task.plannedStart = addOneDayToDateStr(task.plannedStart);
          task.deadline = add24HoursToIso(task.deadline);
          saveTasks();
          render();
        };
      });

      document.querySelectorAll('[data-action="edit"]').forEach((btn) => {
        btn.onclick = () => openModal(btn.dataset.id);
      });

      document.querySelectorAll('[data-action="toggle-materials"]').forEach((btn) => {
        btn.onclick = () => {
          const body = document.getElementById(`materials-body-${btn.dataset.id}`);
          if (!body) return;
          const expanded = btn.getAttribute('aria-expanded') === 'true';
          btn.setAttribute('aria-expanded', String(!expanded));
          body.classList.toggle('collapsed', expanded);
        };
      });

      document.querySelectorAll('[data-action="preview-file"]').forEach((btn) => {
        btn.onclick = () => {
          const task = tasks.find((t) => t.id === btn.dataset.taskId);
          const file = task?.materials?.files?.find((f) => f.id === btn.dataset.fileId);
          if (file) previewOrDownloadFile(file);
        };
      });
    }

    function updateCountdowns() {
      document.querySelectorAll('[data-countdown]').forEach((el) => {
        const id = el.dataset.countdown;
        const task = tasks.find((t) => t.id === id);
        if (!task) return;
        const deadlineMs = new Date(task.deadline).getTime();
        el.textContent = formatCountdown(deadlineMs);

        if (!task.completed) {
          const card = el.closest('.task-card');
          if (card) {
            card.classList.remove('urgency-danger', 'urgency-warn');
            const u = getUrgency(deadlineMs);
            if (u === 'danger') card.classList.add('urgency-danger');
            else if (u === 'warn') card.classList.add('urgency-warn');
          }
        }
      });
    }

    function toDatetimeLocalValue(iso) {
      const d = new Date(iso);
      d.setMinutes(d.getMinutes() - d.getTimezoneOffset());
      return d.toISOString().slice(0, 16);
    }

    function openModal(taskId) {
      editingTaskId = taskId || null;
      const isEdit = Boolean(editingTaskId);
      $('#modalTitle').textContent = isEdit ? '编辑任务' : '添加新任务';
      $('#overlay').classList.add('open');
      $('#taskForm').reset();
      $('#linkUrl').value = '';
      $('#linkLabel').value = '';

      const now = new Date();
      const todayStr = toDateInputValue(now);
      now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
      $('#deadline').min = now.toISOString().slice(0, 16);
      $('#plannedStart').max = '';

      if (isEdit) {
        const task = tasks.find((t) => t.id === editingTaskId);
        if (!task) {
          closeModal();
          return;
        }
        $('#courseName').value = task.courseName;
        $('#assignment').value = task.assignment;
        $('#plannedStart').value = task.plannedStart;
        $('#deadline').value = toDatetimeLocalValue(task.deadline);
        $('#plannedStart').max = toDateInputValue(new Date(task.deadline));
        loadFormMaterialsFromTask(task);
      } else {
        $('#plannedStart').value = todayStr;
        const weekLater = new Date();
        weekLater.setDate(weekLater.getDate() + 7);
        $('#deadline').value = toDatetimeLocalValue(weekLater.toISOString());
        resetFormMaterials();
      }

      $('#courseName').focus();
    }

    function closeModal() {
      $('#overlay').classList.remove('open');
      editingTaskId = null;
      resetFormMaterials();
    }

    $('#btnAdd').addEventListener('click', () => openModal());
    $('#btnCancel').addEventListener('click', closeModal);

    $('#overlay').addEventListener('click', (e) => {
      if (e.target === $('#overlay')) closeModal();
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && $('#overlay').classList.contains('open')) closeModal();
    });

    $('#taskForm').addEventListener('submit', (e) => {
      e.preventDefault();
      const courseName = $('#courseName').value.trim();
      const assignment = $('#assignment').value.trim();
      const plannedStart = $('#plannedStart').value;
      const deadline = $('#deadline').value;

      if (!courseName || !assignment || !plannedStart || !deadline) return;

      if (new Date(plannedStart) > new Date(deadline)) {
        alert('计划开始日期不能晚于截止日期');
        return;
      }

      const payload = {
        courseName,
        assignment,
        plannedStart,
        deadline: new Date(deadline).toISOString(),
        materials: cloneMaterials(formMaterials),
      };

      try {
        if (editingTaskId) {
          const task = tasks.find((t) => t.id === editingTaskId);
          if (task) Object.assign(task, payload);
        } else {
          tasks.push({
            id: generateId(),
            ...payload,
            completed: false,
            createdAt: Date.now(),
          });
        }
        saveTasks();
        render();
        closeModal();
      } catch {
        /* saveTasks 已提示 */
      }
    });

    const dropZone = $('#dropZone');
    const fileInput = $('#fileInput');

    fileInput.addEventListener('change', () => {
      if (fileInput.files.length) processFiles(fileInput.files);
      fileInput.value = '';
    });

    dropZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      dropZone.classList.add('dragover');
    });

    dropZone.addEventListener('dragleave', () => {
      dropZone.classList.remove('dragover');
    });

    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropZone.classList.remove('dragover');
      if (e.dataTransfer.files.length) processFiles(e.dataTransfer.files);
    });

    $('#btnAddLink').addEventListener('click', addLinkFromForm);

    const archiveToggle = $('#archiveToggle');
    const archiveBody = $('#archiveBody');
    let archiveExpanded = true;

    archiveToggle.addEventListener('click', () => {
      archiveExpanded = !archiveExpanded;
      archiveToggle.setAttribute('aria-expanded', String(archiveExpanded));
      archiveBody.classList.toggle('collapsed', !archiveExpanded);
      archiveBody.style.maxHeight = archiveExpanded
        ? archiveBody.scrollHeight + 'px'
        : '0';
    });

    function initArchiveHeight() {
      archiveBody.style.maxHeight = archiveBody.scrollHeight + 'px';
    }

    loadTasks();
    render();
    initArchiveHeight();
    requestNotificationIfNeeded();

    setInterval(updateCountdowns, 1000);
    setInterval(checkDueNotifications, 30000);

    window.addEventListener('resize', () => {
      if (archiveExpanded) {
        archiveBody.style.maxHeight = archiveBody.scrollHeight + 'px';
      }
    });
  </script>
</body>
</html>
